# TradieConnect — Project Overview

TradieConnect is a two-sided marketplace connecting Australian customers with licensed tradespeople. Customers post service requests for free; tradies pay $0.50 AUD to unlock request details and submit quotes.

## Business Model

| Concept | Value |
|---------|-------|
| Customer cost | Free |
| Unlock cost (tradie) | $0.50 AUD per request |
| Signup bonus (tradie) | $10 AUD credit |
| Minimum wallet recharge | $5 AUD |
| Commission rate | 5% on completed jobs |

## User Roles

### Customer
- Posts service requests (description, photos, voice messages, preferred dates)
- Receives and compares quotes from multiple tradies
- Accepts a quote → shares address and phone with chosen tradie
- Rates tradie after job completion

### Tradie
- Browses active service requests in the Explorer
- Pays $0.50 to unlock full request details
- Submits detailed quotes (materials, labor, timeline)
- Manages wallet balance (recharge via payment)
- Builds reputation through ratings and completed jobs

### Admin
- Manages users (view, suspend, verify)
- Monitors platform finances (transactions, revenue)
- Oversees platform health and disputes

## Tech Stack

| Layer | Technology |
|-------|-----------|
| Framework | React Native + Expo (iOS, Android, Web) |
| Language | TypeScript (strict) |
| Navigation | React Navigation (Stack + Bottom Tabs) |
| UI | Gluestack UI + NativeWind (Tailwind) |
| Backend | Firebase (Auth, Firestore, Storage, Cloud Functions) |
| Auth | Phone OTP via Firebase Auth |
| Payments | Wallet-based (Stripe integration point) |

## Platform Targets

All code runs on **iOS**, **Android**, and **Web** from a single codebase.

# The Process — How TradieConnect Works

## High-Level Flow

```
Customer posts request → Tradies see summary in Explorer → Tradie pays $0.50 to unlock
→ Tradie submits quote → Customer compares quotes → Customer accepts one
→ Address & phone shared → Job completed → Customer rates tradie
```

## Step-by-Step Breakdown

### 1. Customer Posts a Service Request

- Customer opens the app and taps "Post a Request"
- Fills in: trade type (e.g. Plumbing, Electrical), suburb, description
- Optionally attaches photos and/or a voice message
- Selects preferred date range for the job
- Submits → request goes live immediately with status `active`

### 2. Tradies Browse the Explorer

- Tradies see a feed of active requests filtered by their registered trades and suburbs
- Each card shows: trade type, suburb, date posted, brief description preview
- **Full details are hidden** — tradie sees enough to decide if it's worth unlocking
- Market intelligence data shows competition level and price ranges (if quotes exist)

### 3. Tradie Unlocks a Request ($0.50)

- Tradie taps "Unlock" on a request card
- System checks wallet balance ≥ $0.50
- If sufficient: deducts $0.50, records transaction, reveals full details
- If insufficient: prompts to recharge wallet
- Once unlocked, tradie can see: full description, all photos, voice message, customer's preferred dates

### 4. Tradie Submits a Quote

- After unlocking, tradie can submit a quote with:
  - Materials cost breakdown
  - Labor cost breakdown
  - Total price
  - Estimated start date
  - Estimated completion date
  - Timeline in days
  - Notes/comments
- Quote is saved with status `pending`
- Customer receives a push notification: "New quote received"

### 5. Customer Compares Quotes

- Customer sees all received quotes on their request detail screen
- Each quote shows: tradie name, rating, total price, timeline, breakdown
- Customer can view tradie profiles (rating, total jobs, trades)

### 6. Customer Accepts a Quote

- Customer taps "Accept" on their preferred quote
- System updates:
  - Quote status → `accepted`
  - All other quotes for this request → `rejected`
  - Service request status → `in-progress`
  - Customer's address and phone are shared with the accepted tradie
- Accepted tradie receives notification: "Your quote was accepted!"
- Rejected tradies receive notification: "Another quote was accepted"

### 7. Job Completion

- Once work is done, customer marks the request as `completed`
- Customer rates the tradie (1-5 stars)
- Tradie's rating and totalJobs count are updated
- Service request status → `completed`

## Edge Cases

- **No quotes received**: Request stays active until customer cancels
- **Customer cancels**: Status → `cancelled`, no refunds to tradies who unlocked
- **Tradie unlocks but doesn't quote**: That's their choice, $0.50 is non-refundable
- **Multiple tradies unlock same request**: Each pays independently, competition drives better quotes

## Indexing Strategy

Composite indexes needed for common queries:

| Collection | Fields | Purpose |
|-----------|--------|---------|
| `serviceRequests` | `status` + `createdAt` | Explorer feed (active, newest first) |
| `serviceRequests` | `customerId` + `status` | Customer's own requests |
| `serviceRequests` | `trades` (array-contains) + `status` + `createdAt` | Filter by trade type |
| `quotes` | `serviceRequestId` + `status` | Quotes for a request |
| `quotes` | `tradieId` + `createdAt` | Tradie's quote history |
| `unlockTransactions` | `tradieId` + `serviceRequestId` | Check if already unlocked |
| `walletTransactions` | `userId` + `createdAt` | Wallet history |
| `notifications` | `userId` + `read` + `createdAt` | Unread notifications |
| `ratings` | `tradieId` + `createdAt` | Tradie's ratings |

---

## Security Rules Summary

| Collection | Create | Read | Update | Delete |
|-----------|--------|------|--------|--------|
| `users` | Auth (own doc) | Owner or Admin | Owner or Admin | Admin only |
| `serviceRequests` | Customer | Authenticated | Owner or Cloud Function | Owner (if active) |
| `quotes` | Cloud Function | Request owner or quote owner | Cloud Function | Never |
| `unlockTransactions` | Cloud Function | Owner or Admin | Never | Never |
| `walletTransactions` | Cloud Function | Owner or Admin | Never | Never |
| `requestIntelligence` | Cloud Function | Authenticated | Cloud Function | Never |
| `notifications` | Cloud Function | Owner | Owner (mark read) | Owner |
| `ratings` | Cloud Function | Authenticated | Never | Never |

## CustomerDashboard

The home screen for customers. Shows at-a-glance status of their requests.

### Content
- **Stats row**: Active requests count, Quotes received count, Completed jobs count
- **Active Requests list**: Cards showing each active request with:
  - Trade type and suburb
  - Date posted
  - Number of quotes received
  - Status badge (active, in-progress)
  - Tap → RequestDetailScreen

### Empty State
- First-time users see: "No requests yet. Post your first request to get quotes from local tradies!"
- CTA button → PostRequestScreen

---

## PostRequestScreen

Multi-step form for creating a service request.

### Steps
1. **Trade Selection** — pick one or more trade types (Plumbing, Electrical, Carpentry, etc.)
2. **Location** — enter suburb (autocomplete from Australian suburbs list)
3. **Description** — text area for job details

  <script id="md-flows" type="text/markdown">
# User Flows

## Flow 1: Customer Signup & First Request

```
Open app → Login screen → Enter phone → Receive OTP → Verify OTP
→ New user detected → Select role: Customer
→ Enter name → Dashboard (empty state)
→ Tap "Post a Request" → Fill form → Submit
→ Request goes live → Wait for quotes
```

## Flow 2: Tradie Signup & First Unlock

```
Open app → Login screen → Enter phone → Receive OTP → Verify OTP
→ New user detected → Select role: Tradie
→ Onboarding wizard (5 steps) → Complete
→ $10 bonus credited → Dashboard
→ Tap "Browse Requests" → Explorer
→ See request cards → Tap "Unlock $0.50"
→ Balance deducted → Full details revealed
→ Tap "Submit Quote" → Fill quote form → Submit
→ Quote saved → Customer notified
```

## Flow 3: Quote Acceptance & Job Completion

```
Customer receives notification: "New quote from [Tradie]"
→ Opens request detail → Views all quotes
→ Compares prices, ratings, timelines
→ Taps "Accept" on preferred quote
→ System: quote → accepted, others → rejected, request → in-progress
→ Customer's address & phone shared with tradie
→ Chat channel opens between customer and accepted tradie
→ [Work happens in real world]
→ Customer taps "Mark Complete"
→ Rating form appears → Customer rates tradie (1-5 stars + comment)
→ Tradie's rating updated → Request → completed
```

## Flow 4: Wallet Recharge

```
Tradie sees low balance (or tries to unlock with insufficient funds)
→ Taps "Recharge" → Payment screen
→ Selects amount ($5, $10, $20, $50 or custom, min $5)
→ Stripe payment flow → Payment succeeds
→ Cloud Function: walletTransaction created, walletBalance updated
→ Balance reflected immediately → Can now unlock requests
```

## Flow 5: Explorer Browsing with Filters

```
Tradie opens Explorer → Sees all active requests matching their trades/suburbs
→ Taps filter icon → Filter drawer slides in from right
→ Filters by: trade type, suburb, date range, competition level, price range
→ Applies filters → List updates
→ Scrolls through results (10 at a time, auto-loads to 50, then "Load More")
→ Sees a good match → Unlocks → Submits quote
```

## Flow 6: Messaging

```
Quote accepted → Chat channel auto-created
→ Both parties see conversation in Messages tab
→ Can send text messages
→ Push notifications for new messages when app is backgrounded
→ Chat persists until job is completed
```

## Flow 7: Request Cancellation

```
Customer has active request with no accepted quote
→ Opens request detail → Taps "Cancel Request"
→ Confirmation dialog: "Are you sure? Tradies who unlocked won't be refunded."
→ Confirms → Request status → cancelled
→ Request removed from Explorer
→ Tradies who unlocked are NOT refunded (they paid for access, not a guarantee)
```

## Authentication Flow

```
Phone entry → Firebase sends OTP (reCAPTCHA on web)
→ User enters 6-digit code → Firebase verifies
→ If existing user: sign in → route to role-based dashboard
→ If new user: create Auth account → role selection → onboarding
→ Session persists via Firebase Auth (auto-refresh tokens)
```

## State Machine: Service Request

```
                    ┌─────────────┐
                    │   active    │
                    └──────┬──────┘
                           │
              ┌────────────┼────────────┐
              │            │            │
              ▼            │            ▼
     ┌────────────┐       │    ┌─────────────┐
     │ cancelled  │       │    │ in-progress │
     └────────────┘       │    └──────┬──────┘
                          │           │
                          │           ▼
                          │    ┌─────────────┐
                          │    │  completed  │
                          │    └─────────────┘
                          │
                (no quotes accepted,
                 customer cancels)
```

## State Machine: Quote

```
     ┌─────────┐
     │ pending │
     └────┬────┘
          │
     ┌────┼────┐
     │         │
     ▼         ▼
┌──────────┐ ┌──────────┐
│ accepted │ │ rejected │
└──────────┘ └──────────┘
```

  <script id="md-cloud-functions" type="text/markdown">
# Cloud Functions

All sensitive business logic runs server-side via Firebase Cloud Functions (callable). The client never directly writes to financial or quote-related collections.

## Function Reference

| Function | Auth | Purpose |
|----------|------|---------|
| `unlockServiceRequest` | Tradie | Deduct $0.50, create unlock transaction, reveal details |
| `submitQuote` | Tradie | Validate unlock, create quote, notify customer |
| `acceptQuote` | Customer | Accept quote, reject others, share contact details |
| `rechargeWallet` | Tradie | Process payment, credit wallet |
| `completeServiceRequest` | Customer | Mark complete, trigger rating flow |
| `rateTradie` | Customer | Save rating, update tradie's average |
| `cancelServiceRequest` | Customer | Cancel request, update status |
| `sendPushNotification` | System | Send FCM push to target user |
| `updateRequestIntelligence` | Trigger | Recalculate market data on quote changes |

## Function Details

### `unlockServiceRequest`

**Input**: `{ serviceRequestId: string }`

**Logic**:
1. Verify auth (must be tradie)
2. Check request exists and is `active`
3. Check not already unlocked by this tradie
4. Check wallet balance ≥ $0.50
5. Deduct $0.50 from `walletBalance`
6. Create `unlockTransactions` record
7. Create `walletTransactions` record (type: 'unlock', amount: -0.50)
8. Increment `totalUnlocks` on service request
9. Return full request details

**Errors**: `unauthenticated`, `not-found`, `failed-precondition` (insufficient balance or already unlocked)

---

### `submitQuote`

**Input**: `{ serviceRequestId, materialsCost, laborCost, totalPrice, estimatedStartDate, estimatedCompletionDate, timelineDays, notes }`

**Logic**:
1. Verify auth (must be tradie)
2. Check request exists and is `active`
3. Check tradie has unlocked this request
4. Check tradie hasn't already quoted this request
5. Create `quotes` document
6. Increment `totalQuotes` on service request
7. Trigger `updateRequestIntelligence`
8. Send notification to customer

**Errors**: `unauthenticated`, `not-found`, `failed-precondition` (not unlocked or already quoted)

---

### `acceptQuote`

**Input**: `{ quoteId: string }`

**Logic**:
1. Verify auth (must be the request's customer)
2. Check quote exists and is `pending`
3. Check request is `active`
4. Update accepted quote → status: `accepted`, acceptedAt: now
5. Update all other quotes for this request → status: `rejected`
6. Update service request: status → `in-progress`, acceptedQuoteId, acceptedTradieId, share address/phone
7. Create chat channel between customer and tradie
8. Notify accepted tradie: "Your quote was accepted!"
9. Notify rejected tradies: "Another quote was accepted"

---

### `rechargeWallet`

**Input**: `{ amount: number, paymentMethodId: string }`

**Logic**:
1. Verify auth (must be tradie)
2. Validate amount ≥ $5
3. Process payment via Stripe
4. On success: increment `walletBalance`
5. Create `walletTransactions` record (type: 'recharge')
6. Return new balance

---

### `updateRequestIntelligence` (Firestore Trigger)

**Trigger**: On quote create/update/delete

**Logic**:
1. Get all quotes for the affected `serviceRequestId`
2. Calculate: price range, timeline range, materials/labor breakdown
3. Determine competition level (low: 1-2 quotes, medium: 3-5, high: 6+)
4. Calculate opportunity score and win probability
5. Generate recommended price range
6. Write to `requestIntelligence/{requestId}`

## Error Handling Pattern

All functions throw `HttpsError` with standard codes:
- `unauthenticated` — no auth token
- `permission-denied` — wrong role
- `not-found` — resource doesn't exist
- `failed-precondition` — business rule violation
- `internal` — unexpected error

Client catches these and shows user-friendly messages via Toast.
  </script>
  <script id="md-notifications" type="text/markdown">
# Notifications

## Notification Types

| Type | Recipient | Trigger | Title | Message |
|------|-----------|---------|-------|---------|
| `new_quote` | Customer | Quote submitted | "New Quote Received" | "[Tradie] quoted $X for your [Trade] request" |
| `quote_accepted` | Tradie | Quote accepted | "Quote Accepted!" | "Your quote for [Trade] in [Suburb] was accepted" |
| `quote_rejected` | Tradie | Another quote accepted | "Quote Update" | "Another quote was accepted for [Trade] in [Suburb]" |
| `request_completed` | Tradie | Job marked complete | "Job Completed" | "[Customer] marked the job as complete" |
| `new_rating` | Tradie | Customer rates | "New Rating" | "[Customer] rated you [X]/5 stars" |
| `new_message` | Either | Chat message sent | "New Message" | "[Sender]: [message preview]" |
| `wallet_low` | Tradie | Balance < $1 | "Low Balance" | "Your wallet balance is low. Recharge to keep unlocking requests." |
| `request_cancelled` | Tradie | Customer cancels (if unlocked) | "Request Cancelled" | "A request you unlocked has been cancelled" |

## Delivery Channels

### In-App Notifications
- Stored in `notifications` collection
- Shown in notification bell (badge count for unread)
- Tappable → navigates to relevant screen
- Mark as read on tap

### Push Notifications (FCM)
- Sent via `sendPushNotification` Cloud Function
- Triggered when a `notifications` document is created
- Uses user's `fcmToken` from their profile
- Works on iOS and Android (not web — web uses in-app only)

## FCM Token Management

1. On app launch (authenticated): request notification permission
2. On permission granted: get FCM token via `expo-notifications`
3. Save token to `users/{uid}.fcmToken`
4. On token refresh: update Firestore
5. On logout: clear token from Firestore

## Notification Preferences (Future)

Users will be able to toggle:
- Push notifications on/off
- Quiet hours (e.g., no pushes between 10pm-7am)
- Per-type toggles (quotes, messages, marketing)

# Intelligence Computation Algorithm

## The Problem

The Explorer screen shows rich market intelligence on every request card:
- Total quotes, price range, timeline range
- Competition level (low/medium/high)
- Opportunity score (0-100%)
- Win probability (0-100%)
- Recommended price range
- Market trends (price direction, demand level)

These need to be **pre-computed and stored** on the `serviceRequests` document so the Explorer can load them in a single query without joining multiple collections.

---

## Collections Overview

| Collection | Purpose |
|-----------|---------|
| `serviceRequests` | Customer job postings + embedded intelligence fields |
| `quotes` | Tradie interactions — lifecycle: unlocked → quoted → accepted/rejected |
| `walletTransactions` | Financial audit trail (recharges, debits, bonuses) |
| `users` | User profiles (customer, tradie, admin) |
| `notifications` | In-app + push notification records |
| `ratings` | Individual rating records |

**No separate `unlockTransactions` collection.** Unlocks and quotes are merged into a single `quotes` collection with lifecycle statuses.

---

## The `quotes` Lifecycle

```
unlocked → quoted → accepted / rejected
```

| Status | Meaning | When |
|--------|---------|------|
| `unlocked` | Tradie paid $0.50 to see full details | On unlock click |
| `quoted` | Tradie submitted pricing/timeline | On quote submit |
| `accepted` | Customer chose this tradie | On customer accept |
| `rejected` | Customer chose someone else | When another quote is accepted |

A tradie who unlocks but never quotes stays at `status: 'unlocked'` forever. That's fine — it records they paid and looked.

---

## Three Computation Trigger Points

### Trigger 1: Request Created (Customer submits)

Initialize all intelligence fields with defaults.

### Trigger 2: Quote Unlocked (Tradie pays $0.50)

Create `quotes` doc with `status: 'unlocked'`. Increment unlock count on serviceRequest. Adjust demand level.

### Trigger 3: Quote Submitted (Tradie fills in pricing)

Update `quotes` doc to `status: 'quoted'`. Recalculate all intelligence fields based on all quoted entries.

---

## The Algorithm

### On Request Created

**Where:** Cloud Function `onServiceRequestCreated` (Firestore trigger)

**What it sets on the serviceRequest document:**

```
tradesLower: trades.map(t => t.toLowerCase())
status: "new"

intel_totalQuotes: 0
intel_totalUnlocks: 0
intel_priceMin: 0
intel_priceMax: 0
intel_priceAverage: 0
intel_timelineMinDays: 0
intel_timelineMaxDays: 0
intel_timelineAvgDays: 0
intel_materialsMin: 0
intel_materialsMax: 0
intel_materialsAvg: 0
intel_laborMin: 0
intel_laborMax: 0
intel_laborAvg: 0
intel_competitionLevel: "low"
intel_opportunityScore: 90
intel_competitivePosition: "strong"
intel_recommendedPriceMin: 0
intel_recommendedPriceMax: 0
intel_recommendedPriceOptimal: 0
intel_winProbability: 0.85
intel_priceGap: 0
intel_priceGapCategory: "small"
intel_priceDirection: "stable"
intel_demandLevel: "low"
intel_lastQuoteAt: null
intel_updatedAt: serverTimestamp()
```

---

### On Unlock (quotes doc created with status: 'unlocked')

**Where:** Inside the `unlockServiceRequest` callable Cloud Function (already runs server-side)

**What it does:**

1. Validate tradie, check balance, deduct $0.50
2. Create `quotes` doc:
```
{
  tradieId: "trad_001"
  serviceRequestId: "req_001"
  status: "unlocked"
  unlockAmount: 0.50
  unlockedAt: serverTimestamp()
  totalPrice: null
  materialsCost: null
  laborCost: null
  timelineDays: null
  estimatedStartDate: null
  estimatedCompletionDate: null
  notes: null
  quotedAt: null
  acceptedAt: null
  tradieName: "Mike Thompson"
  tradieRating: 4.8
  createdAt: serverTimestamp()
}
```
3. Create `walletTransactions` record (financial audit)
4. Update serviceRequest:
```
intel_totalUnlocks: FieldValue.increment(1)

// Update demand level
if intel_totalUnlocks > 10: intel_demandLevel = "high"
elif intel_totalUnlocks > 5: intel_demandLevel = "medium"

// Boost opportunity if many unlocks but few quotes (people looking, not quoting yet)
if intel_totalUnlocks > 3 and intel_totalQuotes < 3:
    intel_opportunityScore = min(current + 5, 100)

intel_updatedAt: serverTimestamp()
```

---

### On Quote Submitted (quotes doc updated to status: 'quoted')

**Where:** `submitQuote` callable Cloud Function

**What it does:**

1. Validate tradie has an existing `quotes` doc with `status: 'unlocked'` for this request
2. Update the existing `quotes` doc:
```
{
  status: "quoted"
  totalPrice: 280
  materialsCost: 80
  laborCost: 200
  timelineDays: 1
  estimatedStartDate: Timestamp
  estimatedCompletionDate: Timestamp
  notes: "Can come tomorrow morning."
  quotedAt: serverTimestamp()
}
```
3. Fetch ALL `quotes` docs for this `serviceRequestId` where `status == 'quoted'`
4. Recalculate intelligence:

```
function recalculateIntelligence(quotedDocs[], totalUnlocks):

  totalQuotes = quotedDocs.length
  prices = quotedDocs.map(q => q.totalPrice)
  timelines = quotedDocs.map(q => q.timelineDays)
  materials = quotedDocs.map(q => q.materialsCost)
  labor = quotedDocs.map(q => q.laborCost)

  intel_totalQuotes = totalQuotes
  intel_priceMin = min(prices)
  intel_priceMax = max(prices)
  intel_priceAverage = round(avg(prices))
  intel_timelineMinDays = min(timelines)
  intel_timelineMaxDays = max(timelines)
  intel_timelineAvgDays = round(avg(timelines), 1)
  intel_materialsMin = min(materials)
  intel_materialsMax = max(materials)
  intel_materialsAvg = round(avg(materials))
  intel_laborMin = min(labor)
  intel_laborMax = max(labor)
  intel_laborAvg = round(avg(labor))

  // --- Competition Level ---
  if totalQuotes < 3:  intel_competitionLevel = "low"
  elif totalQuotes < 7: intel_competitionLevel = "medium"
  else:                  intel_competitionLevel = "high"

  // --- Price Gap ---
  intel_priceGap = intel_priceMax - intel_priceMin
  if intel_priceGap > 200: intel_priceGapCategory = "large"
  elif intel_priceGap > 100: intel_priceGapCategory = "medium"
  else: intel_priceGapCategory = "small"

  // --- Opportunity Score (0-100) ---
  score = 50

  // Competition factor (40%)
  if totalQuotes == 0: score += 40
  elif totalQuotes < 3: score += 30
  elif totalQuotes < 5: score += 20
  elif totalQuotes < 8: score += 10
  else: score -= 10

  // Price spread factor (30%)
  spreadPct = (intel_priceGap / intel_priceAverage) * 100
  if spreadPct > 50: score += 30
  elif spreadPct > 25: score += 20
  elif spreadPct > 10: score += 10

  // Budget factor (20%)
  if intel_priceAverage > 2000: score += 20
  elif intel_priceAverage > 1000: score += 15
  elif intel_priceAverage > 500: score += 10

  // Freshness factor (10%)
  hoursOld = (now - request.createdAt) / hours
  if hoursOld < 2: score += 10
  elif hoursOld < 6: score += 5
  elif hoursOld > 48: score -= 10

  // Unlock-to-quote bonus
  if totalUnlocks > 3 and totalQuotes < 3: score += 5

  intel_opportunityScore = clamp(score, 10, 100)

  // --- Win Probability ---
  if totalQuotes < 3: intel_winProbability = 0.75
  elif totalQuotes < 5: intel_winProbability = 0.55
  elif totalQuotes < 7: intel_winProbability = 0.40
  else: intel_winProbability = 0.25

  // --- Competitive Position ---
  if totalQuotes < 3: intel_competitivePosition = "strong"
  elif totalQuotes < 7: intel_competitivePosition = "moderate"
  else: intel_competitivePosition = "weak"

  // --- Recommended Price Range ---
  intel_recommendedPriceMin = round(intel_priceAverage * 0.90)
  intel_recommendedPriceMax = round(intel_priceAverage * 1.10)
  intel_recommendedPriceOptimal = round(intel_priceAverage * 0.95)

  // --- Market Trends ---
  if quotedDocs.length >= 4:
    recentHalf = quotedDocs.sortByDate().slice(0, half)
    olderHalf = quotedDocs.sortByDate().slice(half)
    if avg(recentHalf.prices) > avg(olderHalf.prices) * 1.05: intel_priceDirection = "up"
    elif avg(recentHalf.prices) < avg(olderHalf.prices) * 0.95: intel_priceDirection = "down"
    else: intel_priceDirection = "stable"
  else:
    intel_priceDirection = "stable"

  totalInterest = totalUnlocks + totalQuotes
  if totalInterest > 12: intel_demandLevel = "high"
  elif totalInterest > 5: intel_demandLevel = "medium"
  else: intel_demandLevel = "low"

  intel_lastQuoteAt = latestQuotedDoc.quotedAt
  intel_updatedAt = serverTimestamp()
```

5. Write all `intel_*` fields back to `serviceRequests/{serviceRequestId}`
6. Send notification to customer

```typescript
interface QuoteDocument {
  id: string;
  serviceRequestId: string;
  tradieId: string;
  tradieName: string;
  tradieRating: number;

  // --- Lifecycle ---
  status: 'unlocked' | 'quoted' | 'accepted' | 'rejected';

  // --- Unlock data (set on creation) ---
  unlockAmount: number;               // always 0.50
  unlockedAt: Timestamp;

  // --- Quote data (null until status = 'quoted') ---
  totalPrice: number | null;
  materialsCost: number | null;
  laborCost: number | null;
  timelineDays: number | null;
  estimatedStartDate: Timestamp | null;
  estimatedCompletionDate: Timestamp | null;
  notes: string | null;
  quotedAt: Timestamp | null;

  // --- Acceptance (null until status = 'accepted') ---
  acceptedAt: Timestamp | null;

  // --- Timestamps ---
  createdAt: Timestamp;
}
```

### Key Queries on `quotes`

| Query | Purpose |
|-------|---------|
| `where(tradieId, ==, X) && where(serviceRequestId, ==, Y)` | Has this tradie unlocked this request? |
| `where(serviceRequestId, ==, X) && where(status, 'in', ['quoted','accepted','rejected'])` | All actual quotes for intelligence calculation |
| `where(serviceRequestId, ==, X)` | All interactions (unlocks + quotes) — total interest |
| `where(tradieId, ==, X) && where(status, ==, 'quoted')` | Tradie's quote history |
| `where(serviceRequestId, ==, X) && where(status, ==, 'accepted')` | Who won this job? |

---

## `walletTransactions` Collection Schema (Flat)

```typescript
interface WalletTransactionDocument {
  id: string;
  userId: string;
  type: 'recharge' | 'unlock' | 'bonus' | 'refund';
  amount: number;                     // positive = credit, negative = debit
  description: string;
  referenceId: string;                // serviceRequestId or payment ID
  status: 'completed' | 'pending' | 'failed';
  createdAt: Timestamp;
}
```

This remains the financial audit trail. Every unlock creates both a `quotes` doc (lifecycle) AND a `walletTransactions` doc (money trail).

---

## Firestore Limitations & Constraints

### Key Constraints

| Constraint | Impact |
|-----------|--------|
| One `array-contains-any` per query | Can't filter by trades AND another array field |
| `in` / `array-contains-any` max 30 values | Batch if 30+ trade filters |
| Inequality filters require matching `orderBy` | `budgetMax >= X` forces `orderBy('budgetMax')` first |
| Multiple inequalities on different fields | Needs composite index per combination |
| No OR across different fields | Can't do in single query |

### Why Flat Fields

- `FieldValue.increment()` works directly on `intel_totalUnlocks`
- Simple `where('intel_competitionLevel', '==', 'low')` queries
- No dot-notation update headaches
- Easier composite index definitions

### Our Hybrid Strategy

**Server-side (always):**
- `where('status', '==', 'new')` + `orderBy('createdAt', 'desc')` + pagination
- Optionally ONE of: `array-contains-any(tradesLower)` OR `where('postcode', '==', X)`

**Client-side (after fetch):**
- Urgency, budget range, posted-within
- All intelligence filters
- All sort options except "Newest"

---

## How Filters Map to Fields

### Server-Side (Firestore WHERE)

| Filter | Field | Query |
|--------|-------|-------|
| Status | `status` | `== 'new'` |
| Trade type | `tradesLower` | `array-contains-any` |
| Postcode | `postcode` | `== value` |

### Client-Side (Post-Fetch)

| Filter | Field | Logic |
|--------|-------|-------|
| Urgency | `urgency` | includes check |
| Budget range | `budgetMax` | >= min and <= max |
| Posted within | `createdAt` | >= (now - hours) |
| Competition level | `intel_competitionLevel` | exact match |
| Opportunity score | `intel_opportunityScore` | range (min-max) |
| Win rate | `intel_winProbability` | >= threshold |
| Price gap | `intel_priceGapCategory` | exact match |

### Sort Options

| Sort | Where | Why |
|------|-------|-----|
| Newest | Firestore | Supports cursor pagination |
| Best Opportunity | Client | Can't combine orderBy with other constraints |
| Closest | Client | Distance calculated per-tradie |
| Highest Budget | Client | Would need different orderBy |

---

## Composite Indexes Needed

| Collection | Fields | Purpose |
|-----------|--------|---------|
| `serviceRequests` | `status` ASC, `createdAt` DESC | Explorer primary |
| `serviceRequests` | `status` ASC, `tradesLower` ARRAY, `createdAt` DESC | Explorer + trade filter |
| `serviceRequests` | `customerId` ASC, `status` ASC, `createdAt` DESC | Customer dashboard |
| `quotes` | `serviceRequestId` ASC, `status` ASC | Quotes for a request |
| `quotes` | `tradieId` ASC, `serviceRequestId` ASC | Unlock check |
| `quotes` | `tradieId` ASC, `status` ASC, `createdAt` DESC | Tradie history |
| `walletTransactions` | `userId` ASC, `createdAt` DESC | Wallet history |

---

## Cloud Functions Needed

| Function | Type | Trigger/Action |
|----------|------|----------------|
| `onServiceRequestCreated` | Firestore trigger | Initialize `intel_*` defaults + `tradesLower` |
| `unlockServiceRequest` | Callable | Validate, deduct wallet, create `quotes` doc (status: unlocked), create `walletTransactions`, increment `intel_totalUnlocks` on request |
| `submitQuote` | Callable | Validate unlock exists, update `quotes` doc (status: quoted, add pricing), recalculate ALL `intel_*` on request, notify customer |
| `acceptQuote` | Callable | Update winning quote (status: accepted), reject others, update request status, share contact, notify |

---

## Summary: What Happens at Each Action

### Customer Posts Request
```
FE: Upload files → Write to serviceRequests (status: 'new')
BE trigger: Set intel_* defaults, compute tradesLower
```

### Tradie Unlocks Request
```
FE: Call unlockServiceRequest callable
BE callable:
  1. Validate balance >= $0.50
  2. Deduct $0.50 from user.walletBalance
  3. Create quotes/{id} with status: 'unlocked'
  4. Create walletTransactions/{id} (type: 'unlock', amount: -0.50)
  5. Update serviceRequest: intel_totalUnlocks++, adjust intel_demandLevel
  6. Return success
```

### Tradie Submits Quote
```
FE: Call submitQuote callable
BE callable:
  1. Find existing quotes doc (tradieId + serviceRequestId + status: 'unlocked')
  2. Update it: status → 'quoted', add totalPrice/materials/labor/timeline/notes
  3. Fetch all quotes for this request where status in ['quoted','accepted','rejected']
  4. Run recalculateIntelligence() → write intel_* fields to serviceRequest
  5. Create notification for customer
  6. Return success
```

### Customer Accepts Quote
```
FE: Call acceptQuote callable
BE callable:
  1. Update winning quote: status → 'accepted', acceptedAt
  2. Update all other quoted docs for same request: status → 'rejected'
  3. Update serviceRequest: status → 'assigned', share address/phone
  4. Notify accepted tradie + rejected tradies
```

---

## Migration Steps

| Step | What |
|------|------|
| 1 | Create/update Cloud Functions (trigger + callables) |
| 2 | Migrate existing `unlockTransactions` data into `quotes` collection |
| 3 | Flatten `intelligence` nested object to `intel_*` fields on serviceRequests |
| 4 | Flatten `budget: {min,max}` to `budgetMin`, `budgetMax` |
| 5 | Add `tradesLower` field to all existing serviceRequests |
| 6 | Run backfill script to compute intel_* from existing quotes |
| 7 | Update FE `explorerService.ts` to read flat fields |
| 8 | Update FE components to use new field names |
| 9 | Delete `unlockTransactions` collection (after migration verified) |

# Project Skeleton — Reusable Setup Guide

This documents everything we set up in TradieConnect that was derived from BuildOn's proven patterns. Use this as a checklist when starting a new React Native + Firebase project.

---

## 1. Core Stack

| Layer | Package | Version |
|-------|---------|---------|
| Framework | `expo` | 56+ |
| Runtime | `react-native` | 0.85+ |
| Language | TypeScript | 5.8 (strict) |

## 2. Firebase Setup (Dual SDK)

### Web SDK (`app/services/firebase.ts`)
- Uses `firebase` JS SDK (web-only)
- Emulator connections via `EXPO_PUBLIC_LOCAL_*` env flags
- Re-exports all Firestore/Auth/Storage/Functions helpers
- Phone auth via reCAPTCHA on web

### Native SDK (`app/services/firebase.native.ts`)
- Uses `@react-native-firebase/*` packages
- Auto-initialized from `google-services.json` (Android) + `GoogleService-Info.plist` (iOS)
- Same API surface as web version (same exports)
- Platform-split via React Native's `.native.ts` file resolution
- Emulator host: `10.0.2.2` for Android emulator, `127.0.0.1` for iOS

### Packages Installed
```
@react-native-firebase/app
@react-native-firebase/auth
@react-native-firebase/firestore
@react-native-firebase/functions
@react-native-firebase/storage
@react-native-firebase/messaging
@react-native-firebase/crashlytics
@react-native-firebase/app-check
expo-build-properties

## 3. Navigation (Hybrid — Web Sidebar + Mobile Tabs)

### Problem Solved
`@react-navigation/bottom-tabs` v7 is broken on web. We built a custom solution.

### Architecture
```
Web (≥768px):  WebSidebar (permanent left) + content area
Web (<768px):  Custom BottomTabBar + content area (no sidebar)
Mobile:        Custom BottomTabBar + content area
```

### Files Created
| File | Purpose |
|------|---------|
| `app/navigation/WebSidebar.tsx` | Permanent dark sidebar for web |
| `app/navigation/WebLayout.tsx` | Sidebar + content wrapper (responsive) |
| `app/navigation/BottomTabBar.tsx` | Custom bottom tabs (pure RN primitives) |
| `app/navigation/NavigationContext.tsx` | `useScreenNavigation()` hook for screen-to-screen nav |
| `app/navigation/CustomerTabs.tsx` | Customer layout (web sidebar or mobile tabs) |
| `app/navigation/TradieTabs.tsx` | Tradie layout (web sidebar or mobile tabs) |

### Key Pattern
Screens use `useScreenNavigation()` instead of React Navigation's `useNavigation()`:
```typescript
import { useScreenNavigation } from '../../navigation/NavigationContext';
const navigation = useScreenNavigation();
navigation.navigate('PostRequest');
```

## 8. Auth Context (useReducer pattern)

### Actions

## 9. Cloud Functions (Modular Backend)

### Structure
```
functions/src/
  index.ts                          → Clean entry point (imports + re-exports)
  modules/
    requests/
      intelligence.ts               → recalculateIntelligence() shared helper
      onCreate.ts                   → Firestore trigger: init intel_* defaults
      unlock.ts                     → Callable: deduct wallet, create quote doc
      submitQuote.ts                → Callable: update quote, recalculate intel
      acceptQuote.ts                → Callable: accept/reject lifecycle
      complete.ts                   → Callable: mark complete + rate
    payments/
      rechargeWallet.ts             → Callable: add funds
    notifications/
      sendPush.ts                   → Callable: FCM push
```

### Key Pattern
- `admin.initializeApp()` only in `index.ts`
- Each module imports `admin` and gets `db = admin.firestore()`
- Use `FieldValue`, `Timestamp` from `firebase-admin/firestore` (not `admin.firestore.FieldValue`)
